<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelas 8 - Arafah</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #333;
      }
      .container-main {
        margin-top: 40px;
      }
      .card-custom {
        border-radius: 15px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        border: none;
      }
      .btn-custom {
        border-radius: 25px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .btn-custom:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }
      .header-title {
        color: white;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }
      .student-info {
        background-color: #f8f9fa;
        padding: 20px;
        border-radius: 10px;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Back</a>
        <span class="navbar-text text-white ms-auto">Kelas 8 - Arafah</span>
      </div>
    </nav>

    <div class="container container-main">
      <!-- Header Section -->
      <div class="text-center mb-5">
        <h1 class="header-title">Selamat Datang di Kelas 8 Arafag</h1>
        <h5 class="header-title">SMP Salman Alfarisi Cibinong</h5>
        <h7>By: Reinissa Marsyafiana</h7>
      </div>

      <!-- Class Information Card -->
      <div class="card card-custom mb-4">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">Informasi Kelas</h4>
        </div>
        <div class="card-body">
          <div id="classInfo" class="student-info">
            <!-- JavaScript will fill this -->
          </div>
        </div>
      </div>

      <!-- Student List Card -->
      <div class="card card-custom mb-4">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">Daftar Siswa</h4>
        </div>
        <div class="card-body">
          <table class="table table-striped" id="studentTable">
            <thead>
              <tr>
                <th>No.</th>
                <th>Nama Siswa</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="studentList">
              <!-- JavaScript will fill this -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="card card-custom mb-5">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">Aksi</h4>
        </div>
        <div class="card-body">
          <div class="d-grid gap-2 d-md-flex justify-content-md-center">
            <button class="btn btn-danger btn-custom btn-lg" onclick="startAttendance()">
              Mulai Absensi
            </button>
            <button class="btn btn-warning btn-custom btn-lg text-dark" onclick="showClassStats()">
              Statistik Kelas
            </button>
            <button class="btn btn-info btn-custom btn-lg" onclick="downloadReport()">
              Download Laporan
            </button>
          </div>
        </div>
      </div>

      <!-- Statistics Modal -->
      <div id="statsModal" class="card card-custom mb-4" style="display: none;">
        <div class="card-header bg-warning text-dark">
          <h4 class="mb-0">Statistik Kehadiran</h4>
        </div>
        <div class="card-body">
          <div id="statsContent"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Class Data
      const classData = {
        name: "Kelas 8 Arafah",
        grade: 8,
        teacher: "Budi Santoso",
        totalStudents: 10,
        room: "Ruang 8B",
        academicYear: "2025/2026"
      };

      // Student List
      const students = [
        { id: 1, name: "Ahmad Reza Arab", status: "Hadir" },
        { id: 2, name: "Bella Ayu", status: "Hadir" },
        { id: 3, name: "Citra Dewi", status: "Sakit" },
        { id: 4, name: "Doni Pratama", status: "Hadir" },
        { id: 5, name: "Eka Putri", status: "Hadir" },
        { id: 6, name: "Fajar Hidayat", status: "Izin" },
        { id: 7, name: "Gina Maharani", status: "Hadir" },
        { id: 8, name: "Hendra Wijaya", status: "Hadir" },
        { id: 9, name: "Indah Kusuma", status: "Hadir" },
        { id: 10, name: "Joko Setiawan", status: "Hadir" }
      ];

      // Initialize page
      function initPage() {
        displayClassInfo();
        displayStudents();
      }

      // Display class information
      function displayClassInfo() {
        const classInfoDiv = document.getElementById("classInfo");
        classInfoDiv.innerHTML = `
          <p><strong>Nama Kelas:</strong> ${classData.name}</p>
          <p><strong>Tingkat:</strong> Kelas ${classData.grade}</p>
          <p><strong>Wali Kelas:</strong> ${classData.teacher}</p>
          <p><strong>Ruang Kelas:</strong> ${classData.room}</p>
          <p><strong>Jumlah Siswa:</strong> ${classData.totalStudents}</p>
          <p><strong>Tahun Ajaran:</strong> ${classData.academicYear}</p>
        `;
      }

      // Display student list
      function displayStudents() {
        const studentList = document.getElementById("studentList");
        studentList.innerHTML = "";
        
        students.forEach((student, index) => {
          const statusBadge = getStatusBadge(student.status);
          const row = `
            <tr>
              <td>${index + 1}</td>
              <td>${student.name}</td>
              <td>${statusBadge}</td>
            </tr>
          `;
          studentList.innerHTML += row;
        });
      }

      // Get status badge color
      function getStatusBadge(status) {
        let badgeClass = "";
        if (status === "Hadir") badgeClass = "bg-success";
        else if (status === "Sakit") badgeClass = "bg-warning";
        else if (status === "Izin") badgeClass = "bg-info";
        else badgeClass = "bg-danger";
        
        return `<span class="badge ${badgeClass}">${status}</span>`;
      }

      // Start attendance
      function startAttendance() {
        alert("Memulai absensi untuk " + classData.name + "\n\nFitur ini akan diintegrasikan dengan formulir absensi interaktif.");
        console.log("Attendance started for " + classData.name);
      }

      // Show class statistics
      function showClassStats() {
        const statsModal = document.getElementById("statsModal");
        const statsContent = document.getElementById("statsContent");
        
        // Calculate statistics
        const hadir = students.filter(s => s.status === "Hadir").length;
        const sakit = students.filter(s => s.status === "Sakit").length;
        const izin = students.filter(s => s.status === "Izin").length;
        const absen = students.filter(s => s.status === "Absen").length;
        
        const percentage = ((hadir / students.length) * 100).toFixed(2);
        
        statsContent.innerHTML = `
          <div class="row text-center">
            <div class="col-md-3">
              <h5 class="text-success">Hadir</h5>
              <h3 class="text-success font-weight-bold">${hadir}</h3>
            </div>
            <div class="col-md-3">
              <h5 class="text-warning">Sakit</h5>
              <h3 class="text-warning font-weight-bold">${sakit}</h3>
            </div>
            <div class="col-md-3">
              <h5 class="text-info">Izin</h5>
              <h3 class="text-info font-weight-bold">${izin}</h3>
            </div>
            <div class="col-md-3">
              <h5 class="text-danger">Absen</h5>
              <h3 class="text-danger font-weight-bold">${absen}</h3>
            </div>
          </div>
          <hr>
          <p class="text-center"><strong>Tingkat Kehadiran: ${percentage}%</strong></p>
        `;
        
        statsModal.style.display = statsModal.style.display === "none" ? "block" : "none";
      }

      // Download report
      function downloadReport() {
        let reportContent = `LAPORAN KELAS\n`;
        reportContent += `========================\n`;
        reportContent += `Kelas: ${classData.name}\n`;
        reportContent += `Wali Kelas: ${classData.teacher}\n`;
        reportContent += `Tahun Ajaran: ${classData.academicYear}\n`;
        reportContent += `========================\n\n`;
        reportContent += `DAFTAR SISWA:\n`;
        
        students.forEach((student, index) => {
          reportContent += `${index + 1}. ${student.name} - ${student.status}\n`;
        });
        
        // Create download
        const element = document.createElement("a");
        element.setAttribute("href", "data:text/plain;charset=utf-8," + encodeURIComponent(reportContent));
        element.setAttribute("download", `Laporan_${classData.name}.txt`);
        element.style.display = "none";
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
        
        alert("Laporan berhasil diunduh!");
      }

      // Run initialization when page loads
      window.addEventListener("DOMContentLoaded", initPage);
    </script>
  </body>
</html>
